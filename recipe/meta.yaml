{% set name = "clusterrunner" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  noarch: python
  entry_points:
    - clusterrunner = clusterrunner.main:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - paramiko

test:
  imports:
    - clusterrunner
  requires:
    - pip

about:
  home: https://github.com/algotom/clusterrunner
  license: Apache-2.0
  license_file: LICENSE
  summary: GUI software for submitting and managing Python jobs on Slurm Clusters
